services:
  pennyspy:
    image: docker.io/moqba/pennyspy:latest
    environment:
      # Uncomment any of the lines below to set configuration options
      # - PENNYSPY_PORT=5056
      # user can set these in the .env file
      # - PENNYSPY_RBCU=user
      # - PENNYSPY_RBCP=hunter123
      # !! If you are not using any of these options, remove the 'environment:' tag entirely.
    env_file:
      - .env
    volumes:
      - "./pennyspy-data:/app/data"
    ports:
      - '5056:5056'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import os,urllib.request,sys; port=os.environ.get('PENNYSPY_PORT','5056'); sys.exit(0 if urllib.request.urlopen(f'http://127.0.0.1:{port}/docs', timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3