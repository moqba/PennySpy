name: Docker build

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install test dependencies
        run: uv sync --all-extras --locked

      - name: Check pinned Chrome version
        run: uv run pytest pennyspy/tests/test_chrome_version.py

      - name: Update uv lockfile
        run: uv lock

      - name: Build Docker image
        run: docker build -t pennyspy:pr-check .
